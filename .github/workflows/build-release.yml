name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          python3 -c "import json; json.load(open('android/app/google-services.json')); print('JSON is valid')"

      - name: Create keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/release-key.jks

      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../release-key.jks\n' \
            '${{ secrets.KEYSTORE_PASSWORD }}' \
            '${{ secrets.KEY_PASSWORD }}' \
            '${{ secrets.KEY_ALIAS }}' \
            > android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-pub
        continue-on-error: true

      - name: Find and collect APK files
        run: |
          echo "=== Searching all APK files ==="
          find . -name "*.apk" -not -path "*/flutter/*" 2>/dev/null
          echo "=== Build directory structure ==="
          find build/app/outputs/ -type f 2>/dev/null || echo "build/app/outputs not found"
          echo "=== Checking alternate paths ==="
          ls -la build/app/outputs/apk/release/ 2>/dev/null || echo "release dir not found"

      - name: Build Release AAB
        run: flutter build appbundle --release --no-pub

      - name: Find AAB files
        run: |
          echo "=== Searching all AAB files ==="
          find . -name "*.aab" -not -path "*/flutter/*" 2>/dev/null

      - name: Upload APK (flexible path)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            build/app/outputs/apk/release/*.apk
            build/app/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 30
